<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JNNBuilder - Neural Network Editor</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <header class="top-bar glass">
            <div class="logo">
                <span class="logo-icon">🧠</span>
                <h1>JNNBuilder</h1>
            </div>
            <nav class="actions">
                <button id="btn-new" title="New Network (Ctrl+N)">New</button>
                <button id="btn-save" title="Save Network (Ctrl+S)">Save</button>
                <button id="btn-load" title="Open Network (Ctrl+O)">Open</button>
                <div class="divider"></div>
                <button id="btn-train" class="primary">Train</button>
                <button id="btn-export">Export</button>
            </nav>
            <div class="zoom-controls">
                <button id="btn-zoom-out">-</button>
                <span id="zoom-level">100%</span>
                <button id="btn-zoom-in">+</button>
                <button id="btn-fit">Fit</button>
            </div>
        </header>

        <main class="content">
            <aside class="sidebar-left glass">
                <section class="layers-section">
                    <h2>Available Layers</h2>
                    <div id="layer-palette" class="palette scrollable">
                        <!-- Layer buttons will be injected here -->
                    </div>
                </section>
            </aside>

            <div class="canvas-wrapper">
                <canvas id="editor-canvas"></canvas>
            </div>

            <aside class="sidebar-right glass">
                <section class="properties-section">
                    <h2>Properties</h2>
                    <div id="properties-panel" class="scrollable">
                        <div class="empty-state">No layer selected</div>
                    </div>
                </section>
            </aside>
        </main>

        <footer class="status-bar glass">
            <div id="status-text">Ready</div>
            <div id="selection-status"></div>
            <div id="coordinates">X: 0, Y: 0</div>
        </footer>
    </div>

    <!-- WASM library -->
    <script src="Release-wasm/beednn.js"></script>
    
    <!-- Application scripts -->
    <script type="module" src="app.js"></script>
</body>
</html>
